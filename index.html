<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remori Bots | Control Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon-green: #39FF14;
            --robotic-red: #FF0000;
            --pure-white: #FFFFFF;
            --gray-mpauko: #1a1a1a;
            --bg-dark: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            background-color: var(--bg-dark);
            color: var(--pure-white);
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden; /* Itafunguka baada ya loader */
        }

        /* --- ADVANCED ROBOTIC GEAR LOADER --- */
        #loader {
            position: fixed;
            width: 100%; height: 100vh;
            background: #000;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 10000;
        }

        .gears-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
        }

        .gear {
            position: absolute;
            border: 6px dashed;
            border-radius: 50%;
        }

        .gear-large {
            width: 100px; height: 100px;
            border-color: var(--neon-green);
            animation: rotate-cw 3s linear infinite;
        }

        .gear-small {
            width: 50px; height: 50px;
            top: 25px; left: 25px;
            border-color: var(--robotic-red);
            animation: rotate-ccw 2s linear infinite;
        }

        @keyframes rotate-cw { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes rotate-ccw { 0% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } }

        .status-text {
            margin-top: 30px;
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-green);
            letter-spacing: 5px;
            font-size: 14px;
            text-shadow: 0 0 10px var(--neon-green);
        }

        /* --- NAVIGATION --- */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 4%;
            background: rgba(10, 10, 10, 0.95);
            border-bottom: 2px solid var(--robotic-red);
            position: fixed; width: 100%; top: 0; z-index: 999;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            letter-spacing: 2px;
            color: var(--pure-white);
        }

        .logo span { color: var(--robotic-red); }

        .nav-links { display: flex; list-style: none; gap: 30px; }
        .nav-links a {
            text-decoration: none; color: var(--pure-white);
            font-weight: 600; font-size: 14px;
            text-transform: uppercase; transition: 0.3s;
        }
        .nav-links a:hover { color: var(--neon-green); text-shadow: 0 0 8px var(--neon-green); }

        .menu-icon { display: none; font-size: 24px; color: var(--robotic-red); cursor: pointer; }

        /* --- HERO SECTION --- */
        .hero {
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
            background: radial-gradient(circle, #1a1a1a 0%, #050505 100%);
        }

        .glitch-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 10vw, 5rem);
            color: var(--pure-white);
            position: relative;
            text-transform: uppercase;
        }

        .btn-container { margin-top: 50px; }

        .btn-launch {
            padding: 18px 50px;
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            cursor: pointer;
            position: relative;
            clip-path: polygon(15% 0, 100% 0, 85% 100%, 0% 100%);
            transition: 0.4s;
        }

        .btn-launch:hover {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 30px var(--neon-green);
        }

        /* --- FOOTER SOCIALS --- */
        .footer-socials {
            position: fixed;
            bottom: 0;
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 40px;
            background: linear-gradient(transparent, #000);
        }

        .footer-socials a {
            font-size: 24px;
            color: var(--pure-white);
            transition: 0.4s ease;
        }

        .footer-socials a:hover {
            color: var(--robotic-red);
            transform: translateY(-10px) scale(1.3);
        }

        /* --- MOBILE LAYOUT --- */
        @media (max-width: 800px) {
            .nav-links { display: none; }
            .menu-icon { display: block; }
            .glitch-title { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="gears-wrapper">
            <div class="gear gear-large"></div>
            <div class="gear gear-small"></div>
        </div>
        <div class="status-text" id="status-text">SYSTEM_BOOTING...</div>
    </div>

    <nav>
        <div class="logo">REMORI<span>BOTS</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="bots.html">Bots Center</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="expected.html">Expected</a></li>
        </ul>
        <div class="menu-icon"><i class="fas fa-bars"></i></div>
    </nav>

    <section class="hero">
        <h1 class="glitch-title">REMORI_HUB</h1>
        <p style="color: var(--neon-green); letter-spacing: 2px;">SECURE • AUTOMATED • PRO</p>
        
        <div class="btn-container">
            <button class="btn-launch" onclick="window.location.href='bots.html'">ENTER SYSTEM</button>
        </div>
    </section>

    <div class="footer-socials">
        <a href="https://t.me/remoribots" target="_blank" title="Telegram"><i class="fab fa-telegram"></i></a>
        <a href="https://wa.me/yournumber" target="_blank" title="WhatsApp"><i class="fab fa-whatsapp"></i></a>
        <a href="https://instagram.com/remoribots" target="_blank" title="Instagram"><i class="fab fa-instagram"></i></a>
        <a href="https://facebook.com/remoribots" target="_blank" title="Facebook"><i class="fab fa-facebook"></i></a>
        <a href="https://twitter.com/remoribots" target="_blank" title="Twitter"><i class="fab fa-x-twitter"></i></a>
    </div>

    <script>
        // Loader Logic
        window.addEventListener('load', () => {
            const status = document.getElementById('status-text');
            
            // Simulation ya maendeleo ya loading
            setTimeout(() => { status.innerText = "LOADING_BOT_CORES..."; }, 1000);
            setTimeout(() => { status.innerText = "ESTABLISHING_CONNECTION..."; }, 2000);
            
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.transition = "0.8s";
                loader.style.opacity = "0";
                setTimeout(() => {
                    loader.style.display = "none";
                    document.body.style.overflow = "auto";
                }, 800);
            }, 3500);
        });
    </script>
</body>
</html>
