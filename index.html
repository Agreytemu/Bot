<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remori Bots | Systems Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon-green: #39FF14;
            --robotic-red: #FF0000;
            --pure-white: #FFFFFF;
            --gray-mpauko: #1a1a1a;
            --bg-dark: #050505;
            --overlay: rgba(0, 0, 0, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--pure-white);
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            background-image: linear-gradient(var(--gray-mpauko) 1px, transparent 1px), 
                              linear-gradient(90deg, var(--gray-mpauko) 1px, transparent 1px);
            background-size: 50px 50px; /* Cyber Grid Effect */
        }

        /* --- PRO GEAR LOADER --- */
        #loader {
            position: fixed; width: 100%; height: 100vh;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10000;
        }
        .gears { position: relative; width: 100px; height: 100px; }
        .g1, .g2 { position: absolute; border: 5px dashed; border-radius: 50%; }
        .g1 { width: 80px; height: 80px; border-color: var(--neon-green); animation: spin 2s linear infinite; }
        .g2 { width: 40px; height: 40px; top: 20px; left: 20px; border-color: var(--robotic-red); animation: spin-rev 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes spin-rev { to { transform: rotate(-360deg); } }

        /* --- NAVIGATION --- */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: var(--overlay);
            border-bottom: 2px solid var(--robotic-red);
            position: fixed; width: 100%; top: 0; z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: bold; }
        .logo span { color: var(--robotic-red); }

        /* PC Menu */
        .nav-links { display: flex; list-style: none; gap: 25px; }
        .nav-links a {
            text-decoration: none; color: var(--pure-white);
            text-transform: uppercase; font-weight: bold; font-size: 0.9rem;
            transition: 0.3s; padding: 5px 10px;
        }
        .nav-links a:hover { color: var(--neon-green); border-bottom: 2px solid var(--neon-green); }

        /* Hamburger Simu */
        .menu-btn { display: none; font-size: 1.8rem; color: var(--robotic-red); cursor: pointer; }

        /* Side Menu (Mobile Only) */
        .side-menu {
            position: fixed; top: 0; right: -100%; width: 280px; height: 100vh;
            background: var(--overlay); border-left: 3px solid var(--robotic-red);
            display: flex; flex-direction: column; padding: 80px 30px;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1100;
        }
        .side-menu.active { right: 0; }
        .side-menu a {
            color: white; text-decoration: none; font-size: 1.5rem;
            margin: 15px 0; font-family: 'Orbitron', sans-serif;
            border-bottom: 1px solid #333; transition: 0.3s;
        }
        .side-menu a:hover { color: var(--neon-green); padding-left: 10px; }
        .close-btn { position: absolute; top: 20px; left: 20px; font-size: 2rem; color: var(--robotic-red); cursor: pointer; }

        /* --- HERO --- */
        .hero {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            padding: 0 5%;
        }
        .hero h1 {
            font-family: 'Orbitron', sans-serif; font-size: clamp(2rem, 10vw, 4.5rem);
            color: var(--pure-white); text-shadow: 0 0 20px var(--robotic-red);
        }
        .btn-launch {
            margin-top: 30px; padding: 20px 60px; background: transparent;
            border: 2px solid var(--neon-green); color: var(--neon-green);
            font-family: 'Orbitron', sans-serif; cursor: pointer;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
            transition: 0.4s; font-weight: bold;
        }
        .btn-launch:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 50px var(--neon-green); }

        /* --- FOOTER --- */
        footer {
            position: fixed; bottom: 0; width: 100%; padding: 20px;
            display: flex; justify-content: center; gap: 30px;
            background: linear-gradient(transparent, #000);
        }
        footer a { font-size: 1.6rem; color: var(--pure-white); transition: 0.3s; }
        footer a:hover { color: var(--neon-green); transform: scale(1.4) rotate(10deg); }

        /* --- RESPONSIVE LOGIC --- */
        @media (max-width: 900px) {
            .nav-links { display: none; }
            .menu-btn { display: block; }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="gears">
            <div class="g1"></div>
            <div class="g2"></div>
        </div>
        <p style="margin-top: 20px; color: var(--neon-green); font-family: 'Orbitron'; letter-spacing: 3px;">INITIALIZING_REMORI_OS...</p>
    </div>

    <nav>
        <div class="logo">REMORI<span>BOTS</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="bots.html">Bots Center</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="expected.html">Expected</a></li>
        </ul>
        <div class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars-staggered"></i></div>
    </nav>

    <div class="side-menu" id="sideMenu">
        <div class="close-btn" onclick="toggleMenu()">&times;</div>
        <a href="index.html" onclick="toggleMenu()">HOME</a>
        <a href="bots.html" onclick="toggleMenu()">BOTS CENTER</a>
        <a href="about.html" onclick="toggleMenu()">ABOUT</a>
        <a href="contact.html" onclick="toggleMenu()">CONTACT</a>
        <a href="expected.html" onclick="toggleMenu()">EXPECTED</a>
    </div>

    <section class="hero">
        <h1 id="typewriter">REMORI_CORE</h1>
        <p style="color: var(--neon-green); margin-top: 10px; font-weight: bold;">[ SYSTEM STATUS: ONLINE ]</p>
        <button class="btn-launch" onclick="window.location.href='bots.html'">EXECUTE HUB</button>
    </section>

    <footer>
        <a href="https://t.me/remoribots" target="_blank"><i class="fab fa-telegram"></i></a>
        <a href="https://wa.me/yournumber" target="_blank"><i class="fab fa-whatsapp"></i></a>
        <a href="https://instagram.com/remoribots" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://facebook.com/remoribots" target="_blank"><i class="fab fa-facebook"></i></a>
    </footer>

    <script>
        // Loader Control
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
            }, 2500);
        };

        // Side Menu Logic (Hii ndio inafanya menu ifunguke kwa simu)
        function toggleMenu() {
            const menu = document.getElementById('sideMenu');
            menu.classList.toggle('active');
        }

        // Typewriter Effect Simple
        const text = "REMORI_CORE";
        let i = 0;
        function type() {
            if (i < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(i);
                i++;
                setTimeout(type, 150);
            }
        }
        document.getElementById("typewriter").innerHTML = "";
        setTimeout(type, 3000);
    </script>
</body>
</html>
