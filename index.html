<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remori Bots | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon-green: #39FF14;
            --robotic-red: #FF0000;
            --pure-white: #FFFFFF;
            --dark-bg: #0a0a0a;
            --gray-mpauko: #2a2a2a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--dark-bg);
            color: var(--pure-white);
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
        }

        /* --- ROBOTIC GEARS PRELOADER --- */
        #loader {
            position: fixed;
            width: 100%; height: 100vh;
            background: #000;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999;
        }

        .gears-container { position: relative; width: 150px; height: 150px; }

        .gear {
            position: absolute;
            border: 8px solid transparent;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
        }

        /* Gia ya kwanza (Clockwise - Green) */
        .gear-1 {
            width: 100px; height: 100px;
            border-top: 8px solid var(--neon-green);
            border-bottom: 8px solid var(--neon-green);
            animation: spin 2s linear infinite;
        }

        /* Gia ya pili (Anti-Clockwise - Red) */
        .gear-2 {
            width: 60px; height: 60px;
            top: 20px; left: 20px;
            border-left: 5px solid var(--robotic-red);
            border-right: 5px solid var(--robotic-red);
            animation: spin-back 1.5s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes spin-back { 0% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } }

        .load-text {
            margin-top: 30px;
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
            letter-spacing: 3px;
            font-size: 0.8rem;
        }

        /* --- MODERN NAVIGATION --- */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%;
            background: rgba(42, 42, 42, 0.9);
            border-bottom: 2px solid var(--robotic-red);
            position: sticky; top: 0; z-index: 100;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            color: var(--pure-white);
        }

        .logo span { color: var(--robotic-red); }

        /* Links za PC */
        .nav-links { display: flex; list-style: none; gap: 25px; }
        .nav-links a {
            text-decoration: none; color: var(--pure-white);
            font-weight: bold; font-size: 1rem;
            transition: 0.3s; position: relative;
        }
        .nav-links a:hover { color: var(--neon-green); }

        /* Menu Icon kwa Simu */
        .mobile-menu { display: none; cursor: pointer; color: var(--robotic-red); font-size: 1.5rem; }

        /* --- HERO SECTION --- */
        .hero {
            height: 80vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; padding: 0 20px;
        }

        .hero h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 8vw, 4rem);
            border-right: 4px solid var(--neon-green);
            white-space: nowrap; overflow: hidden;
            animation: typing 3s steps(20, end), blink .5s step-end infinite;
        }

        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink { from, to { border-color: transparent } 50% { border-color: var(--neon-green) } }

        .btn-robotic {
            margin-top: 40px;
            padding: 15px 40px;
            background: transparent;
            border: 2px solid var(--robotic-red);
            color: var(--pure-white);
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            transition: 0.5s;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%); /* Robotic shape */
        }

        .btn-robotic:hover {
            background: var(--robotic-red);
            box-shadow: 0 0 20px var(--robotic-red);
            transform: scale(1.05);
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .mobile-menu { display: block; }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="gears-container">
            <div class="gear gear-1"></div>
            <div class="gear gear-2"></div>
        </div>
        <div class="load-text">REMORI SYSTEMS INITIALIZING...</div>
    </div>

    <nav>
        <div class="logo">REMORI<span>BOTS</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="bots.html">Bots Center</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="expected.html">Expected</a></li>
        </ul>
        <div class="mobile-menu" onclick="toggleMobileMenu()">
            <i class="fas fa-bars"></i>
        </div>
    </nav>

    <section class="hero">
        <h1>REMORI_BOT_CENTER</h1>
        <p style="color: #888; margin-top: 10px;">The Next Generation of Telegram & WhatsApp Automation.</p>
        <button class="btn-robotic" onclick="window.location.href='bots.html'">ACCESS BOT_HUB</button>
    </section>

    <script>
        // Loader timeout
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
            }, 2500);
        });

        function toggleMobileMenu() {
            alert("Hapa utatengeneza Side Overlay ya menu kwa simu");
            // Unaweza kuongeza logic ya kufungua menu hapa
        }
    </script>
</body>
</html>
