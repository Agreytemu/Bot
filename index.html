<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remori Bots | Future of Automation</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-red: #ff3e3e;
            --primary-blue: #00a8ff;
            --soft-gray: #f4f4f4;
            --dark-gray: #333;
            --glass-white: rgba(255, 255, 255, 0.9);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--soft-gray);
            overflow-x: hidden;
        }

        /* --- PRELOADER ANIMATION --- */
        #loader {
            position: fixed;
            width: 100%;
            height: 100vh;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .bot-pulse {
            width: 80px;
            height: 80px;
            border: 5px solid var(--primary-blue);
            border-top: 5px solid var(--primary-red);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 20px;
            font-family: 'Orbitron', sans-serif;
            color: var(--dark-gray);
            letter-spacing: 2px;
        }

        /* --- NAVIGATION --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: var(--glass-white);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: bold;
            color: var(--dark-gray);
        }

        .logo span {
            color: var(--primary-red);
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--dark-gray);
            font-weight: 600;
            transition: 0.3s;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .nav-links a:hover {
            color: var(--primary-blue);
        }

        /* Menu ya Simu (Hamburger) */
        .menu-toggle {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
        }

        .menu-toggle span {
            width: 30px;
            height: 3px;
            background: var(--primary-red);
            border-radius: 5px;
        }

        /* --- HERO SECTION --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(135deg, #fff 0%, #e0e0e0 100%);
            padding: 0 20px;
        }

        .hero h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            margin-bottom: 20px;
            color: var(--dark-gray);
        }

        .hero p {
            max-width: 600px;
            margin-bottom: 30px;
            color: #666;
        }

        .btn-main {
            padding: 15px 40px;
            background: var(--primary-blue);
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 168, 255, 0.4);
            transition: 0.4s;
            border: none;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
        }

        .btn-main:hover {
            transform: translateY(-5px);
            background: var(--primary-red);
            box-shadow: 0 4px 15px rgba(255, 62, 62, 0.4);
        }

        /* --- FOOTER / SOCIALS --- */
        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            padding: 15px 5%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.8);
        }

        .social-icons {
            display: flex;
            gap: 25px;
        }

        .social-icons a {
            font-size: 20px;
            color: var(--dark-gray);
            transition: 0.3s;
        }

        .social-icons a:hover {
            color: var(--primary-blue);
            transform: scale(1.2);
        }

        /* --- MOBILE RESPONSIVE --- */
        @media (max-width: 768px) {
            .nav-links {
                display: none; /* Inafichwa kwa simu hadi menu iguswe */
                position: absolute;
                top: 70px;
                right: 5%;
                background: #fff;
                flex-direction: column;
                width: 200px;
                padding: 20px;
                box-shadow: 0 10px 20px rgba(0,0,0,0.1);
                border-radius: 10px;
            }

            .nav-links.active {
                display: flex;
            }

            .menu-toggle {
                display: flex;
            }

            .hero h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="bot-pulse"></div>
        <div class="loading-text">INITIALIZING REMORI...</div>
    </div>

    <nav>
        <div class="logo">REMORI<span>BOTS</span></div>
        
        <ul class="nav-links" id="navLinks">
            <li><a href="#" onclick="showSection('home')">Nyumbani</a></li>
            <li><a href="#" onclick="showSection('bots')">Bot Center</a></li>
            <li><a href="#" onclick="showSection('about')">Kuhusu</a></li>
            <li><a href="#" onclick="showSection('contact')">Mawasiliano</a></li>
            <li><a href="#" onclick="showSection('expected')">Expected Bots</a></li>
        </ul>

        <div class="menu-toggle" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <section class="hero" id="main-content">
        <h1>FUTURE OF AUTOMATION</h1>
        <p>Karibu kwenye kitovu cha Bot za kisasa kwa ajili ya Telegram, WhatsApp na Biashara yako. Rahisisha kazi zako na Remori Bots.</p>
        <button class="btn-main" onclick="showSection('bots')">INGIA BOT CENTER</button>
    </section>

    <footer>
        <div class="social-icons">
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-telegram-plane"></i></a>
            <a href="#"><i class="fab fa-whatsapp"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
        </div>
    </footer>

    <script>
        // 1. Simulating Loading Animation
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 500);
            }, 2000); // Itakaa kwa sekunde 2
        });

        // 2. Toggle Menu kwa Simu
        function toggleMenu() {
            const navLinks = document.getElementById('navLinks');
            navLinks.classList.toggle('active');
        }

        // 3. Simple Section Switcher (Logic ya mwanzo)
        function showSection(section) {
            const hero = document.querySelector('.hero');
            const navLinks = document.getElementById('navLinks');
            
            // Funga menu kama ipo wazi (kwa simu)
            navLinks.classList.remove('active');

            if(section === 'bots') {
                hero.innerHTML = `
                    <h1 style="font-size: 2.5rem;">BOT CENTER</h1>
                    <p>Chagua Bot ya kuanza nayo:</p>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px;">
                        <button class="btn-main" style="font-size: 12px; padding: 10px;">Business Bot</button>
                        <button class="btn-main" style="font-size: 12px; padding: 10px;">Security Bot</button>
                        <button class="btn-main" style="font-size: 12px; padding: 10px;">Madonna Bot</button>
                        <button class="btn-main" style="font-size: 12px; padding: 10px;">Job Bot</button>
                    </div>
                `;
            } else if (section === 'about') {
                hero.innerHTML = `<h1>KUHUSU SISI</h1><p>Remori Bots ni kampuni ya kiteknolojia inayolenga kurahisisha mawasiliano kupitia AI.</p><button class="btn-main" onclick="location.reload()">RUDI HOME</button>`;
            } else if (section === 'contact') {
                hero.innerHTML = `<h1>MAWASILIANO</h1><p>Email: support@remoribots.com<br>Simu: +255 ...</p><button class="btn-main" onclick="location.reload()">RUDI HOME</button>`;
            } else if (section === 'expected') {
                hero.innerHTML = `<h1>EXPECTED BOTS</h1><p>Hivi karibuni: Management Bot, Education Bot, na Company Specialized Bots.</p><button class="btn-main" onclick="location.reload()">RUDI HOME</button>`;
            } else {
                location.reload(); // Rudi Home
            }
        }
    </script>
</body>
</html>
